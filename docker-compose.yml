version: "3.9"

x-logging: &default-logging
  driver: loki
  options:
    loki-url: "http://loki:3100/api/prom/push"
    loki-retries: "2"
    max-size: "10m"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: remediator
      POSTGRES_PASSWORD: remediator
      POSTGRES_DB: self_healing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remediator"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine-api:
    build: ./engine
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://remediator:remediator@postgres:5432/self_healing
      REDIS_URL: redis://redis:6379/0
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_CHANNEL: ${SLACK_CHANNEL:-#remediation}
      K8S_IN_CLUSTER: "false"
      K8S_CONFIG_PATH: /app/kube-config
      LOG_LEVEL: INFO
    volumes:
      - ${KUBECONFIG:-~/.kube/config}:/app/kube-config:ro
      - ./engine/rules.yaml:/app/rules.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./engine
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://remediator:remediator@postgres:5432/self_healing
      REDIS_URL: redis://redis:6379/0
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_CHANNEL: ${SLACK_CHANNEL:-#remediation}
      K8S_IN_CLUSTER: "false"
      K8S_CONFIG_PATH: /app/kube-config
      LOG_LEVEL: INFO
    volumes:
      - ${KUBECONFIG:-~/.kube/config}:/app/kube-config:ro
      - ./engine/rules.yaml:/app/rules.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - promdata:/prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  loki:
    image: grafana/loki:3.2.0
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml
      - lokidata:/loki
    command: -config.file=/etc/loki/loki-config.yml

  promtail:
    image: grafana/promtail:3.2.0
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml
    command: -config.file=/etc/promtail/promtail-config.yml

  jaeger:
    image: jaegertracing/all-in-one:1.62
    ports:
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafdata:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel

volumes:
  pgdata:
  promdata:
  lokidata:
  grafdata:
