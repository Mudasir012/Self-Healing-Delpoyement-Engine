# Secret is created externally (see Makefile k8s-deploy target).
# Override POSTGRES_PASSWORD for production:
#   kubectl create secret generic postgres-secret \
#     -n self-healing \
#     --from-literal=POSTGRES_PASSWORD=<secure-value>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: self-healing
data:
  POSTGRES_USER: remediator
  POSTGRES_DB: self_healing
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: self-healing
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "remediator"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: self-healing
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
